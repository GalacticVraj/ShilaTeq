name: CI

on:
  push:
    branches: [main]
  pull_request:

# Enterprise quality gates (M7). Every PR must pass typecheck, lint, format,
# build, E2E (incl. axe a11y + broken-link), and Lighthouse budgets.
jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (navigation, demo, a11y, broken-link, responsive)
        run: npm run test:e2e

      - name: Lighthouse CI (perf / a11y / seo / best-practices budgets)
        run: npx --yes @lhci/cli@0.15.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
